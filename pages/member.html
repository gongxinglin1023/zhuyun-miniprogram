<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会员中心 - 珠韵东方</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: var(--white);
      text-align: center;
      padding: 120px 0 80px;
      margin-top: 70px;
    }
    .page-header h1 { color: var(--white); font-size: 2.5rem; margin-bottom: 12px; }
    .page-header p { opacity: 0.9; font-size: 1.1rem; }
    .member-benefits { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 60px; }
    .benefit-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .benefit-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .benefit-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .benefit-icon svg { width: 28px; height: 28px; fill: var(--white); }
    .benefit-title { font-size: 1.1rem; color: var(--dark); margin-bottom: 8px; }
    .benefit-desc { color: var(--text-light); font-size: 0.9rem; }
    .register-section {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 60px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      box-shadow: var(--shadow-md);
    }
    .register-section h2 { font-size: 1.8rem; margin-bottom: 16px; }
    .register-section p { color: var(--text-light); margin-bottom: 32px; }
    .input-group { margin-bottom: 20px; }
    .input-group input {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-md);
      font-size: 1rem;
    }
    .input-group input:focus { outline: none; border-color: var(--primary); }
    .btn-register {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: var(--white);
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      transition: var(--transition);
    }
    .btn-register:hover { background: var(--primary-dark); }
    @media (max-width: 768px) {
      .member-benefits { grid-template-columns: repeat(2, 1fr); }
      .register-section { padding: 40px 24px; }
    }
  </style>
</head>
<body data-page="member">
  
  <header class="header" id="header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></div>
        <div class="logo-text">
          <span class="logo-name">珠韵东方</span>
          <span class="logo-en">ZHUYUN ORIENTAL</span>
        </div>
      </a>
      <nav class="nav">
        <a href="../index.html" class="nav-link">首页</a>
        <a href="products.html" class="nav-link">产品中心</a>
        <a href="about.html" class="nav-link">品牌故事</a>
        <a href="store.html" class="nav-link">门店体验</a>
        <a href="member.html" class="nav-link active">会员中心</a>
        <a href="contact.html" class="nav-link">联系我们</a>
      </nav>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1>会员中心</h1>
      <p>加入珠韵东方，尽享专属礼遇</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">会员权益</h2>
      </div>
      <div class="member-benefits">
        <div class="benefit-card">
          <div class="benefit-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
          <h3 class="benefit-title">专属折扣</h3>
          <p class="benefit-desc">会员专享95折起优惠</p>
        </div>
        <div class="benefit-card">
          <div class="benefit-icon"><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4z"/></svg></div>
          <h3 class="benefit-title">积分换礼</h3>
          <p class="benefit-desc">消费积分可兑换精美礼品</p>
        </div>
        <div class="benefit-card">
          <div class="benefit-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg></div>
          <h3 class="benefit-title">品质保障</h3>
          <p class="benefit-desc">终身免费清洗保养服务</p>
        </div>
        <div class="benefit-card">
          <div class="benefit-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
          <h3 class="benefit-title">优先体验</h3>
          <p class="benefit-desc">新品优先购买权</p>
        </div>
      </div>

      <div class="register-section">
        <h2>立即注册会员</h2>
        <p>填写手机号，即可成为珠韵东方会员</p>
        <form id="register-form">
          <div class="input-group">
            <input type="tel" placeholder="请输入手机号" required>
          </div>
          <div class="input-group" style="display:flex;gap:12px;">
            <input type="text" placeholder="验证码" required style="flex:1;">
            <button type="button" style="padding:0 20px;background:var(--gray-100);border-radius:var(--radius-md);">获取验证码</button>
          </div>
          <button type="submit" class="btn-register">立即注册</button>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom"><p>&copy; 2025 珠韵东方 版权所有</p></div>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
    });
    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('注册功能即将上线，敬请期待！');
    });
  </script>
</body>
</html>
