<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品中心 - 珠韵东方</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: var(--white);
      text-align: center;
      padding: 120px 0 80px;
      margin-top: 70px;
    }
    .page-header h1 {
      color: var(--white);
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .page-header p {
      opacity: 0.9;
      font-size: 1.1rem;
    }
    .filter-bar {
      background: var(--white);
      padding: 20px 0;
      margin-bottom: 40px;
      box-shadow: var(--shadow-sm);
    }
    .filter-inner {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-group label {
      color: var(--text-light);
      font-size: 0.9rem;
    }
    .filter-group select {
      padding: 8px 16px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-md);
      background: var(--white);
      font-size: 0.9rem;
      cursor: pointer;
    }
    .filter-group select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .sort-select {
      margin-left: auto;
    }
    .products-full {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }
    @media (max-width: 1024px) {
      .products-full { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .products-full { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="products">
  
  <header class="header" id="header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">珠韵东方</span>
          <span class="logo-en">ZHUYUN ORIENTAL</span>
        </div>
      </a>
      <nav class="nav">
        <a href="../index.html" class="nav-link">首页</a>
        <a href="products.html" class="nav-link active">产品中心</a>
        <a href="about.html" class="nav-link">品牌故事</a>
        <a href="store.html" class="nav-link">门店体验</a>
        <a href="member.html" class="nav-link">会员中心</a>
        <a href="contact.html" class="nav-link">联系我们</a>
      </nav>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1>产品中心</h1>
      <p>每一颗珍珠，都承载着独特的美</p>
    </div>
  </div>

  <div class="filter-bar">
    <div class="container filter-inner">
      <div class="filter-group">
        <label>分类：</label>
        <select id="category-filter">
          <option value="">全部</option>
          <option value="classic">经典单珠</option>
          <option value="multi">多珠串链</option>
          <option value="designer">设计师款</option>
          <option value="gift">礼物套装</option>
        </select>
      </div>
      <div class="filter-group">
        <label>价格：</label>
        <select id="price-filter">
          <option value="">全部</option>
          <option value="0-1000">¥1000以下</option>
          <option value="1000-3000">¥1000-3000</option>
          <option value="3000-5000">¥3000-5000</option>
          <option value="5000-10000">¥5000-10000</option>
          <option value="10000+">¥10000以上</option>
        </select>
      </div>
      <div class="filter-group sort-select">
        <label>排序：</label>
        <select id="sort-select">
          <option value="default">默认排序</option>
          <option value="price-asc">价格从低到高</option>
          <option value="price-desc">价格从高到低</option>
          <option value="sales">销量优先</option>
        </select>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="products-full" id="products-container">
        <p style="grid-column:1/-1;text-align:center;color:var(--text-light);padding:40px;">加载中...</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2025 珠韵东方 版权所有</p>
      </div>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
</body>
</html>
